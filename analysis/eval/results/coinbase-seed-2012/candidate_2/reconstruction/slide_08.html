<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1280px; height: 720px; overflow: hidden;
    background: #E8ECF0;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .eyebrow {
    font-size: 13px; color: #888888;
    letter-spacing: 0.18em; text-transform: uppercase;
    margin-bottom: 48px;
  }
  .analogy {
    font-size: 52px; font-weight: 300;
    text-align: center;
    line-height: 1.25;
  }
  .analogy .primary { color: #2E3A5F; font-weight: 700; }
  .analogy .secondary { color: #888888; }
  .sub {
    margin-top: 40px;
    font-size: 18px; color: #888888;
    text-align: center; max-width: 680px;
    line-height: 1.6;
  }
</style>
</head>
<body>
  <div class="eyebrow">Positioning</div>
  <div class="analogy">
    <span class="primary">Coinbase</span>
    <span class="secondary"> is to </span>
    <span class="primary">Bitcoin</span><br>
    <span class="secondary">what </span>
    <span class="primary">iTunes</span>
    <span class="secondary"> was to </span>
    <span class="primary">MP3</span>
  </div>
  <div class="sub">
    The consumer-friendly layer that makes a powerful but raw technology accessible to everyone
  </div>
</body>
</html>
