<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1280px; height: 720px; overflow: hidden;
    background: #E8ECF0;
    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    display: flex;
    align-items: center; justify-content: center;
  }
  .statement {
    font-size: 38px; font-weight: 300;
    line-height: 1.4;
    text-align: center;
    letter-spacing: -0.5px;
  }
  .navy { color: #2E3A5F; }
  .gray { color: #888888; }
  .sep { color: #b0b8c8; margin: 0 18px; }
</style>
</head>
<body>
  <div class="statement">
    <span class="navy">Coinbase</span>
    <span class="sep">is to</span>
    <span class="navy">Bitcoin</span>
    <br>
    <span class="gray">what</span>
    <span class="sep">&nbsp;</span>
    <span class="navy">iTunes</span>
    <span class="gray">&nbsp;was to&nbsp;</span>
    <span class="navy">MP3</span>
  </div>
</body>
</html>
