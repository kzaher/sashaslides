<!-- slide_03.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1280px; height: 720px; overflow: hidden;
    background: #E8ECF0;
    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    display: flex; flex-direction: column;
    align-items: center;
    padding-top: 56px;
  }
  h1 {
    font-size: 40px; font-weight: 300; color: #333333;
    text-align: center; margin-bottom: 32px;
  }
  .map-card {
    background: #fff;
    border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.10);
    padding: 16px;
    width: 1100px;
    height: 520px;
    position: relative;
    overflow: hidden;
  }
  svg.world { width: 100%; height: 100%; }
  .annotation {
    position: absolute;
    font-size: 13px; font-weight: 300; color: #888888;
    white-space: nowrap;
  }
  .dot-label {
    display: flex; align-items: center; gap: 6px;
    font-size: 14px; font-weight: 300; color: #333333;
  }
  .legend {
    position: absolute; bottom: 20px; left: 24px;
    display: flex; gap: 24px;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 300; color: #888888; }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; }
</style>
</head>
<body>
  <h1>Bitcoin is Global</h1>
  <div class="map-card">
    <svg viewBox="0 0 1068 488" xmlns="http://www.w3.org/2000/svg" class="world">
      <!-- Simplified world map paths -->
      <rect width="1068" height="488" fill="#f0f4f8"/>
      <!-- North America -->
      <path d="M80,80 L200,70 L230,100 L220,180 L180,220 L140,210 L100,230 L70,200 L60,150 Z" fill="#d8e4f0" stroke="#c0cfe0" stroke-width="1"/>
      <!-- South America -->
      <path d="M170,240 L220,230 L240,270 L230,340 L200,380 L170,370 L150,320 L155,270 Z" fill="#d8e4f0" stroke="#c0cfe0" stroke-width="1"/>
      <!-- Europe -->
      <path d="M450,60 L540,55 L560,80 L550,130 L510,140 L470,130 L445,100 Z" fill="#d8e4f0" stroke="#c0cfe0" stroke-width="1"/>
      <!-- Africa -->
      <path d="M460,150 L530,140 L550,160 L545,260 L510,310 L480,310 L455,260 L450,180 Z" fill="#d8e4f0" stroke="#c0cfe0" stroke-width="1"/>
      <!-- Asia -->
      <path d="M560,50 L800,45 L820,90 L810,160 L760,180 L680,170 L620,160 L570,130 L555,90 Z" fill="#d8e4f0" stroke="#c0cfe0" stroke-width="1"/>
      <!-- East Asia extension -->
      <path d="M760,80 L840,70 L860,120 L830,150 L790,140 L760,110 Z" fill="#d8e4f0" stroke="#c0cfe0" stroke-width="1"/>
      <!-- Australia -->
      <path d="M780,280 L870,270 L890,320 L860,360 L800,355 L770,320 Z" fill="#d8e4f0" stroke="#c0cfe0" stroke-width="1"/>

      <!-- High adoption dots - US -->
      <circle cx="140" cy="130" r="22" fill="#4A90D9" opacity="0.7"/>
      <circle cx="140" cy="130" r="14" fill="#4A90D9" opacity="0.8"/>
      <circle cx="160" cy="145" r="12" fill="#4A90D9" opacity="0.6"/>
      <circle cx="120" cy="150" r="10" fill="#4A90D9" opacity="0.6"/>

      <!-- Europe dots -->
      <circle cx="490" cy="85" r="16" fill="#4A90D9" opacity="0.7"/>
      <circle cx="510" cy="90" r="12" fill="#4A90D9" opacity="0.65"/>
      <circle cx="475" cy="95" r="10" fill="#4A90D9" opacity="0.6"/>

      <!-- East Asia dots -->
      <circle cx="810" cy="110" r="18" fill="#4A90D9" opacity="0.7"/>
      <circle cx="790" cy="100" r="12" fill="#4A90D9" opacity="0.6"/>
      <circle cx="830" cy="125" r="10" fill="#4A90D9" opacity="0.55"/>

      <!-- Region labels -->
      <text x="140" y="175" text-anchor="middle" font-size="13" font-family="Helvetica Neue,Helvetica,Arial,sans-serif" font-weight="700" fill="#2E3A5F">United States</text>
      <text x="493" y="70" text-anchor="middle" font-size="13" font-family="Helvetica Neue,Helvetica,Arial,sans-serif" font-weight="700" fill="#2E3A5F">Europe</text>
      <text x="812" y="96" text-anchor="middle" font-size="13" font-family="Helvetica Neue,Helvetica,Arial,sans-serif" font-weight="700" fill="#2E3A5F">East Asia</text>
    </svg>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#4A90D9;opacity:0.8"></div> High adoption</div>
    </div>
  </div>
</body>
</html>
