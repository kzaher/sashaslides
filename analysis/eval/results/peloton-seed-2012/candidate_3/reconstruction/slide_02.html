<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1280px;height:720px;overflow:hidden;font-family:"Helvetica Neue",Arial,sans-serif}
body{background:#1A1A1A;padding:60px 80px;display:flex;flex-direction:column}
.title{font-size:42px;font-weight:800;font-style:italic;text-transform:uppercase;color:#fff;letter-spacing:.05em;margin-bottom:8px}
.subtitle{font-size:15px;font-weight:400;color:#CCCCCC;letter-spacing:.05em;margin-bottom:48px}
.chart-area{flex:1;position:relative}
svg text{font-family:"Helvetica Neue",Arial,sans-serif}
</style>
</head>
<body>
<div class="title">THE CREATIVE EVOLUTION</div>
<div class="subtitle">From product-led storytelling to fully emotional brand narrative · 2014–2018</div>
<div class="chart-area">
<svg width="1120" height="440" viewBox="0 0 1120 440">
  <!-- Y axis -->
  <line x1="80" y1="20" x2="80" y2="360" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <!-- X axis -->
  <line x1="80" y1="360" x2="1080" y2="360" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <!-- Y labels -->
  <text x="70" y="24" text-anchor="end" font-size="12" fill="#CCCCCC" font-style="italic">Emotional-Led</text>
  <text x="70" y="364" text-anchor="end" font-size="12" fill="#CCCCCC" font-style="italic">Product-Led</text>
  <!-- trend line -->
  <polyline points="160,320 340,270 560,200 720,130 960,60"
    stroke="#F44060" stroke-width="2" fill="none" stroke-dasharray="6 4" opacity="0.7"/>
  <!-- Data point 1 -->
  <circle cx="160" cy="320" r="38" fill="#2A2A2A" stroke="#F44060" stroke-width="2"/>
  <text x="160" y="316" text-anchor="middle" font-size="10" font-weight="700" fill="#F44060">2014–16</text>
  <text x="160" y="330" text-anchor="middle" font-size="9" fill="#fff">"This is</text>
  <text x="160" y="342" text-anchor="middle" font-size="9" fill="#fff">Peloton"</text>
  <text x="160" y="392" text-anchor="middle" font-size="11" fill="#CCCCCC">Product-Focused</text>
  <!-- Data point 2 -->
  <circle cx="340" cy="270" r="38" fill="#2A2A2A" stroke="#F44060" stroke-width="2"/>
  <text x="340" y="266" text-anchor="middle" font-size="10" font-weight="700" fill="#F44060">May 2017</text>
  <text x="340" y="280" text-anchor="middle" font-size="9" fill="#fff">"Hello,</text>
  <text x="340" y="292" text-anchor="middle" font-size="9" fill="#fff">Let's Go"</text>
  <text x="340" y="392" text-anchor="middle" font-size="11" fill="#CCCCCC">Transitional</text>
  <!-- Data point 3 -->
  <circle cx="560" cy="200" r="38" fill="#2A2A2A" stroke="#F44060" stroke-width="2"/>
  <text x="560" y="196" text-anchor="middle" font-size="10" font-weight="700" fill="#F44060">Holiday 17</text>
  <text x="560" y="210" text-anchor="middle" font-size="9" fill="#fff">"Give</text>
  <text x="560" y="222" text-anchor="middle" font-size="9" fill="#fff">It All"</text>
  <text x="560" y="392" text-anchor="middle" font-size="11" fill="#CCCCCC">More Emotional</text>
  <!-- Data point 4 -->
  <circle cx="960" cy="60" r="38" fill="#F44060" stroke="#F44060" stroke-width="2"/>
  <text x="960" y="56" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">Spring 18</text>
  <text x="960" y="70" text-anchor="middle" font-size="9" fill="#fff">"Better</text>
  <text x="960" y="82" text-anchor="middle" font-size="9" fill="#fff">In Us"</text>
  <text x="960" y="392" text-anchor="middle" font-size="11" fill="#CCCCCC">Fully Emotional</text>
</svg>
</div>
</body>
</html>
