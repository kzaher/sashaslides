<!-- slide_13.html -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@1,400;1,600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 1280px; height: 720px; overflow: hidden; background: #FFFFFF; }
body { display: flex; align-items: center; justify-content: center; }
.slide {
  width: 1280px; height: 720px;
  position: relative;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 80px 200px;
}
.quote-body {
  font-family: 'Playfair Display', serif;
  font-style: italic; font-size: 28px; line-height: 1.65;
  color: #2C3040; text-align: center; max-width: 700px;
}
.brand {
  font-family: 'Inter', sans-serif;
  font-style: normal; font-weight: 700; color: #2C3040;
}
.attribution {
  position: absolute; bottom: 72px; right: 104px;
  text-align: right;
}
.attr-source {
  font-family: 'Inter', sans-serif;
  font-size: 13px; font-weight: 500; color: #4A6FA5;
}
.attr-date {
  font-family: 'Inter', sans-serif;
  font-size: 11px; color: #9AAAC8; margin-top: 3px;
}
</style>
</head>
<body>
<div class="slide">
  <div class="quote-body">
    "I have a new addiction. It is powerful. It is disturbing. It is <span class="brand">thefacebook.com</span>."
  </div>
  <div class="attribution">
    <div class="attr-source">The Daily Pennsylvanian</div>
    <div class="attr-date">March 25, 2004</div>
  </div>
</div>
</body>
</html>
