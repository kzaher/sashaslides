<!-- slide_08.html -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@1,400&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 1280px; height: 720px; overflow: hidden; background: #FFFFFF; }
body { display: flex; align-items: center; justify-content: center; }
.slide {
  width: 1280px; height: 720px;
  position: relative;
  display: flex; flex-direction: column;
  justify-content: center;
  padding: 72px 104px;
}
.slide-title {
  font-family: 'Inter', sans-serif;
  font-size: 15px; font-weight: 600;
  color: #4A6FA5; letter-spacing: 0.09em;
  text-transform: uppercase; margin-bottom: 56px;
}
.metrics-grid {
  display: flex; gap: 0;
}
.metric {
  flex: 1; text-align: center;
  padding: 0 20px;
}
.metric-value {
  font-family: 'Inter', sans-serif;
  font-weight: 700; font-size: 56px;
  color: #3B5998; line-height: 1;
  letter-spacing: -0.02em;
}
.metric-unit {
  font-family: 'Inter', sans-serif;
  font-weight: 700; font-size: 32px;
  color: #3B5998;
}
.metric-label {
  font-family: 'Inter', sans-serif;
  font-size: 13px; font-weight: 400;
  color: #6A7A96; margin-top: 14px;
  line-height: 1.4;
}
</style>
</head>
<body>
<div class="slide">
  <div class="slide-title">U.S. college market — purchasing power</div>
  <div class="metrics-grid">
    <div class="metric">
      <div class="metric-value">15<span class="metric-unit">M</span></div>
      <div class="metric-label">college students<br>in the United States</div>
    </div>
    <div class="metric">
      <div class="metric-value">$85<span class="metric-unit">B</span></div>
      <div class="metric-label">estimated annual<br>purchasing power</div>
    </div>
    <div class="metric">
      <div class="metric-value">$21<span class="metric-unit">B</span></div>
      <div class="metric-label">spent annually<br>on restaurants &amp; food</div>
    </div>
    <div class="metric">
      <div class="metric-value">$9<span class="metric-unit">B</span></div>
      <div class="metric-label">spent annually<br>on automobiles</div>
    </div>
  </div>
</div>
</body>
</html>
