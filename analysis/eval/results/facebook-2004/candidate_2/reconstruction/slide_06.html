<!-- slide_06.html -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@1,400&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 1280px; height: 720px; overflow: hidden; background: #4A6FA5; }
body { display: flex; align-items: center; justify-content: center; }
.slide {
  width: 1280px; height: 720px;
  position: relative;
  display: flex; flex-direction: column;
  align-items: flex-start; justify-content: center;
  padding: 80px 104px;
}
.section-label {
  font-family: 'Inter', sans-serif;
  font-size: 36px; font-weight: 400; font-style: italic;
  color: #FFFFFF; letter-spacing: -0.01em;
}
.section-sub {
  font-family: 'Inter', sans-serif;
  font-size: 15px; font-weight: 400;
  color: rgba(255,255,255,0.55); margin-top: 16px;
}
.slide-num {
  position: absolute; bottom: 52px; right: 104px;
  font-family: 'Inter', sans-serif;
  font-size: 11px; color: rgba(255,255,255,0.3); font-weight: 500;
}
</style>
</head>
<body>
<div class="slide">
  <div class="section-label">The audience</div>
  <div class="section-sub">15 million students. $85 billion in purchasing power.</div>
  <div class="slide-num">02</div>
</div>
</body>
</html>
