<!-- slide_20.html -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@1,400;1,600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 1280px; height: 720px; overflow: hidden; background: #FFFFFF; }
body { display: flex; align-items: center; justify-content: center; }
.slide {
  width: 1280px; height: 720px;
  position: relative;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 80px 180px;
}
.quote-body {
  font-family: 'Playfair Display', serif;
  font-style: italic; font-size: 21px; line-height: 1.75;
  color: #2C3040; text-align: center; max-width: 800px;
}
.brand {
  font-family: 'Inter', sans-serif;
  font-style: normal; font-weight: 700; color: #2C3040;
}
.attribution {
  position: absolute; bottom: 72px; right: 104px;
  text-align: right;
}
.attr-source {
  font-family: 'Inter', sans-serif;
  font-size: 13px; font-weight: 500; color: #4A6FA5;
}
.attr-date {
  font-family: 'Inter', sans-serif;
  font-size: 11px; color: #9AAAC8; margin-top: 3px;
}
.contact {
  position: absolute; bottom: 72px; left: 104px;
  font-family: 'Inter', sans-serif;
  font-size: 12px; color: #9AAAC8; line-height: 1.6;
}
.contact-name {
  font-weight: 600; color: #6A7A96;
}
</style>
</head>
<body>
<div class="slide">
  <div class="quote-body">
    "The wonderful thing about <span class="brand">The Facebook</span> is its ability to connect so many people through so many different avenues, including courses, interests, houses, politics, concentration, and favourite movies."
  </div>
  <div class="attribution">
    <div class="attr-source">The Harvard Independent</div>
    <div class="attr-date">March 4, 2004</div>
  </div>
  <div class="contact">
    <div class="contact-name">Eduardo Saverin, CFO</div>
    <div>thefacebook.com — Cambridge, MA 02138</div>
  </div>
</div>
</body>
</html>
