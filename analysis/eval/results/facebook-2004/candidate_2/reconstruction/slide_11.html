<!-- slide_11.html -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@1,400&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 1280px; height: 720px; overflow: hidden; background: #3B5998; }
body { display: flex; align-items: center; justify-content: center; }
.slide {
  width: 1280px; height: 720px;
  position: relative;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 80px 160px;
}
.number {
  font-family: 'Inter', sans-serif;
  font-weight: 700; font-size: 112px;
  color: #FFFFFF; line-height: 1;
  letter-spacing: -0.04em;
}
.label {
  font-family: 'Inter', sans-serif;
  font-size: 22px; font-weight: 300;
  color: rgba(255,255,255,0.75);
  margin-top: 20px; text-align: center;
}
.context {
  font-family: 'Inter', sans-serif;
  font-size: 13px; font-weight: 400;
  color: rgba(255,255,255,0.4);
  margin-top: 36px; letter-spacing: 0.08em;
  text-transform: uppercase;
}
</style>
</head>
<body>
<div class="slide">
  <div class="number">70,000</div>
  <div class="label">registered users in 60 days</div>
  <div class="context">Launched February 4, 2004 — as of March 2004</div>
</div>
</body>
</html>
