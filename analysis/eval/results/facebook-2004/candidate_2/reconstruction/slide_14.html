<!-- slide_14.html -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@1,400&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 1280px; height: 720px; overflow: hidden; background: #4A6FA5; }
body { display: flex; align-items: center; justify-content: center; }
.slide {
  width: 1280px; height: 720px;
  position: relative;
  display: flex; flex-direction: column;
  justify-content: center;
  padding: 80px 104px;
}
.eyebrow {
  font-family: 'Inter', sans-serif;
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.11em; text-transform: uppercase;
  color: rgba(255,255,255,0.5);
  margin-bottom: 32px;
}
.statement {
  font-family: 'Inter', sans-serif;
  font-size: 36px; font-weight: 300; line-height: 1.4;
  color: #FFFFFF; max-width: 720px;
}
.emphasis { font-weight: 700; }
.supporting {
  font-family: 'Inter', sans-serif;
  font-size: 16px; font-weight: 400;
  color: rgba(255,255,255,0.65);
  margin-top: 36px; max-width: 540px;
  line-height: 1.6;
}
</style>
</head>
<body>
<div class="slide">
  <div class="eyebrow">Growth trajectory — April 2004</div>
  <div class="statement"><span class="emphasis">10,000 new members</span> joined in the first week of April 2004.</div>
  <div class="supporting">Daily unique users and pageviews are growing proportionally with the user base. Growth is not slowing.</div>
</div>
</body>
</html>
