<!-- slide_14.html -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1280px;height:720px;overflow:hidden;font-family:Arial,Helvetica,sans-serif;color:#fff}
body{background-color:#4A6FA5;background-image:linear-gradient(rgba(255,255,255,.15) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.15) 1px,transparent 1px);background-size:70px 70px;position:relative}
.logo{position:absolute;top:20px;right:24px;font-family:'Arial Black',Impact,sans-serif;font-size:14pt;font-weight:700}
.title{position:absolute;top:40px;width:100%;text-align:center;font-size:26pt;font-weight:400}
.metric{position:absolute;top:92px;width:100%;text-align:center;font-size:18pt;font-weight:700}
.cards{position:absolute;top:160px;left:40px;right:40px;display:flex;gap:30px}
.card{flex:1;border:1px solid rgba(255,255,255,.5);padding:32px 20px;display:flex;flex-direction:column;align-items:center;gap:18px}
.card-icon{width:110px;height:110px;display:flex;align-items:center;justify-content:center}
.card-label{font-size:14pt;text-align:center;opacity:.9}
.card-value{font-size:18pt;font-weight:700;text-align:center}
</style>
</head>
<body>
<div class="logo">tf.</div>
<div class="title">Platform Engagement</div>
<div class="metric">70,000 users and growing fast</div>
<div class="cards">
  <div class="card">
    <div class="card-icon">
      <svg width="100" height="100" viewBox="0 0 100 100">
        <circle cx="50" cy="35" r="20" fill="none" stroke="white" stroke-width="2.5"/>
        <path d="M 15,88 Q 15,60 50,60 Q 85,60 85,88" fill="none" stroke="white" stroke-width="2.5"/>
      </svg>
    </div>
    <div class="card-label">Total Registered Users</div>
    <div class="card-value">70,000</div>
  </div>
  <div class="card">
    <div class="card-icon">
      <svg width="100" height="100" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="36" fill="none" stroke="white" stroke-width="2.5"/>
        <line x1="50" y1="50" x2="50" y2="20" stroke="white" stroke-width="2.5"/>
        <line x1="50" y1="50" x2="70" y2="62" stroke="white" stroke-width="2.5"/>
        <circle cx="50" cy="50" r="3" fill="white"/>
        <line x1="50" y1="14" x2="50" y2="18" stroke="white" stroke-width="2"/>
        <line x1="50" y1="82" x2="50" y2="86" stroke="white" stroke-width="2"/>
        <line x1="14" y1="50" x2="18" y2="50" stroke="white" stroke-width="2"/>
        <line x1="82" y1="50" x2="86" y2="50" stroke="white" stroke-width="2"/>
      </svg>
    </div>
    <div class="card-label">Daily Unique Users</div>
    <div class="card-value">65%</div>
  </div>
  <div class="card">
    <div class="card-icon">
      <svg width="100" height="100" viewBox="0 0 100 100">
        <rect x="12" y="18" width="76" height="58" rx="4" fill="none" stroke="white" stroke-width="2.5"/>
        <line x1="12" y1="32" x2="88" y2="32" stroke="white" stroke-width="2"/>
        <circle cx="21" cy="25" r="3" fill="none" stroke="white" stroke-width="1.5"/>
        <circle cx="32" cy="25" r="3" fill="none" stroke="white" stroke-width="1.5"/>
        <line x1="24" y1="46" x2="76" y2="46" stroke="white" stroke-width="1.5" opacity=".6"/>
        <line x1="24" y1="56" x2="76" y2="56" stroke="white" stroke-width="1.5" opacity=".6"/>
        <line x1="24" y1="66" x2="60" y2="66" stroke="white" stroke-width="1.5" opacity=".6"/>
      </svg>
    </div>
    <div class="card-label">Daily Pageviews</div>
    <div class="card-value">3 million</div>
  </div>
</div>
</body>
</html>
