<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1280px;height:720px;overflow:hidden;font-family:Arial,Helvetica,sans-serif;color:#fff}
body{background-color:#4A6FA5;background-image:linear-gradient(rgba(255,255,255,.15) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.15) 1px,transparent 1px);background-size:70px 70px;position:relative}
.logo{position:absolute;top:20px;right:24px;font-family:'Arial Black',Impact,sans-serif;font-size:14pt;font-weight:700}
.title{position:absolute;top:60px;width:100%;text-align:center;font-size:30pt;font-weight:400}
.prose{position:absolute;top:155px;left:40px;width:42%;font-size:17pt;line-height:1.7}
.panel{position:absolute;top:138px;left:54%;width:43%;bottom:60px;border:1px solid rgba(255,255,255,.5);display:flex;align-items:center;justify-content:center}
</style>
</head>
<body>
<div class="logo">tf.</div>
<div class="title">Ad Formats &amp; Placements</div>
<div class="prose">Standard IAB banner formats — 468×60, 120×240, 120×90, and 125×125 — plus contextual text links. Rates vary based on scope, duration, and targeting depth. Horizontal and vertical placements available across all pages of the platform.</div>
<div class="panel">
  <svg width="92%" height="92%" viewBox="0 0 480 310">
    <text x="240" y="22" fill="rgba(255,255,255,0.5)" text-anchor="middle" font-size="11" font-family="Arial">468×60 Leaderboard</text>
    <rect x="6"   y="30" width="468" height="60" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1.5" stroke-dasharray="5,3"/>
    <text x="6"   y="25" fill="rgba(255,255,255,0.35)" font-size="9" font-family="Arial">Your ad here</text>

    <text x="56"  y="118" fill="rgba(255,255,255,0.5)" text-anchor="middle" font-size="10" font-family="Arial">120×240</text>
    <rect x="6"   y="126" width="120" height="150" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1.5" stroke-dasharray="5,3"/>

    <text x="205" y="118" fill="rgba(255,255,255,0.5)" text-anchor="middle" font-size="10" font-family="Arial">125×125</text>
    <rect x="148" y="126" width="125" height="125" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1.5" stroke-dasharray="5,3"/>

    <text x="374" y="118" fill="rgba(255,255,255,0.5)" text-anchor="middle" font-size="10" font-family="Arial">120×90</text>
    <rect x="318" y="126" width="120" height="90" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1.5" stroke-dasharray="5,3"/>

    <text x="240" y="296" fill="rgba(255,255,255,0.4)" text-anchor="middle" font-size="10" font-family="Arial">Text link placements also available</text>
  </svg>
</div>
</body>
</html>
