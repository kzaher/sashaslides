<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1280px;height:720px;overflow:hidden;font-family:Arial,Helvetica,sans-serif;color:#fff}
body{background-color:#4A6FA5;background-image:linear-gradient(rgba(255,255,255,.15) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.15) 1px,transparent 1px);background-size:70px 70px;position:relative}
.logo{position:absolute;top:20px;right:24px;font-family:'Arial Black',Impact,sans-serif;font-size:14pt;font-weight:700}
.wrap{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:52%;text-align:center}
.attr{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:22px}
.rule{width:100px;height:1px;background:rgba(255,255,255,.6);flex-shrink:0}
.attr-text{font-size:17pt;font-style:italic;white-space:nowrap}
.quote{font-size:20pt;line-height:1.6;font-weight:400}
.closer{font-size:42pt;margin-top:16px;line-height:1;opacity:.65}
</style>
</head>
<body>
<div class="logo">tf.</div>
<div class="wrap">
  <div class="attr">
    <div class="rule"></div>
    <span class="attr-text">The Daily Pennsylvanian, 03/25/04</span>
  </div>
  <div class="quote">"I have a new addiction. It is powerful. It is disturbing. It is thefacebook.com."</div>
  <div class="closer">&#x201D;</div>
</div>
</body>
</html>
