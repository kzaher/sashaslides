<!-- slide_11.html -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1280px;height:720px;overflow:hidden;font-family:Arial,Helvetica,sans-serif;color:#fff}
body{background-color:#4A6FA5;background-image:linear-gradient(rgba(255,255,255,.15) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.15) 1px,transparent 1px);background-size:70px 70px;position:relative}
.logo{position:absolute;top:20px;right:24px;font-family:'Arial Black',Impact,sans-serif;font-size:14pt;font-weight:700}
.title{position:absolute;top:40px;width:100%;text-align:center;font-size:26pt;font-weight:400}
.metric{position:absolute;top:92px;width:100%;text-align:center;font-size:18pt;font-weight:700}
.cards{position:absolute;top:160px;left:40px;right:40px;display:flex;gap:30px}
.card{flex:1;border:1px solid rgba(255,255,255,.5);padding:32px 20px;display:flex;flex-direction:column;align-items:center;gap:18px}
.card-icon{width:110px;height:110px;display:flex;align-items:center;justify-content:center}
.card-label{font-size:14pt;text-align:center;opacity:.9}
.card-value{font-size:18pt;font-weight:700;text-align:center}
</style>
</head>
<body>
<div class="logo">tf.</div>
<div class="title">Top Spending Categories</div>
<div class="metric">Three categories alone account for $35 billion</div>
<div class="cards">
  <div class="card">
    <div class="card-icon">
      <svg width="100" height="100" viewBox="0 0 100 100">
        <ellipse cx="50" cy="72" rx="34" ry="7" fill="none" stroke="white" stroke-width="2"/>
        <line x1="50" y1="65" x2="50" y2="16" stroke="white" stroke-width="2"/>
        <line x1="36" y1="16" x2="36" y2="36" stroke="white" stroke-width="2"/>
        <line x1="43" y1="16" x2="43" y2="36" stroke="white" stroke-width="2"/>
        <path d="M 36,36 Q 39.5,46 43,36" fill="none" stroke="white" stroke-width="2"/>
        <line x1="62" y1="16" x2="62" y2="46" stroke="white" stroke-width="2"/>
        <path d="M 62,16 Q 72,28 62,40" fill="none" stroke="white" stroke-width="2"/>
      </svg>
    </div>
    <div class="card-label">Restaurants &amp; Food</div>
    <div class="card-value">$21B</div>
  </div>
  <div class="card">
    <div class="card-icon">
      <svg width="110" height="100" viewBox="0 0 110 100">
        <rect x="8" y="36" width="94" height="40" rx="8" fill="none" stroke="white" stroke-width="2"/>
        <rect x="18" y="20" width="55" height="22" rx="4" fill="none" stroke="white" stroke-width="2"/>
        <circle cx="26" cy="80" r="10" fill="none" stroke="white" stroke-width="2"/>
        <circle cx="84" cy="80" r="10" fill="none" stroke="white" stroke-width="2"/>
        <line x1="36" y1="80" x2="74" y2="80" stroke="white" stroke-width="1.5"/>
        <rect x="76" y="44" width="18" height="12" rx="2" fill="none" stroke="white" stroke-width="1.5"/>
      </svg>
    </div>
    <div class="card-label">Automobiles</div>
    <div class="card-value">$9B</div>
  </div>
  <div class="card">
    <div class="card-icon">
      <svg width="100" height="100" viewBox="0 0 100 100">
        <path d="M 20,22 L 10,42 L 20,42 L 20,85 L 80,85 L 80,42 L 90,42 L 80,22 L 65,30 Q 50,18 35,30 Z" fill="none" stroke="white" stroke-width="2"/>
        <path d="M 35,30 Q 50,42 65,30" fill="none" stroke="white" stroke-width="2"/>
      </svg>
    </div>
    <div class="card-label">Clothes</div>
    <div class="card-value">$5B</div>
  </div>
</div>
</body>
</html>
