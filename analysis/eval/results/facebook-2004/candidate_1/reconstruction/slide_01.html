<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 1280px; height: 720px; overflow: hidden; background: #FFFFFF; font-family: 'Inter', sans-serif; }
.title-bar { background: #3B5998; height: 90px; display: flex; align-items: center; padding: 0 58px; }
.title-bar h1 { font-size: 36px; font-weight: 700; color: #FFFFFF; }
.content { padding: 28px 58px 0; }
table { width: 68%; border-collapse: collapse; }
thead tr { background: #4A6FA5; }
thead th { color: #FFFFFF; font-size: 14px; font-weight: 700; padding: 12px 20px; text-align: left; }
thead th:last-child { text-align: right; }
tbody tr:nth-child(even) { background: #E8F0F8; }
tbody tr:nth-child(odd) { background: #FFFFFF; }
tbody td { font-size: 15px; color: #1A1A1A; padding: 11px 20px; border-bottom: 1px solid #C8DCF0; }
tbody td:last-child { text-align: right; font-weight: 700; color: #3B5998; }
tfoot td { font-size: 15px; font-weight: 700; color: #1A1A1A; padding: 11px 20px; background: #C8DCF0; border-top: 2px solid #4A6FA5; }
tfoot td:last-child { text-align: right; color: #3B5998; }
</style>
</head>
<body>
  <div class="title-bar"><h1>Annual Student Spending</h1></div>
  <div class="content">
    <table>
      <thead>
        <tr><th>Category</th><th>Annual Spend (USD)</th></tr>
      </thead>
      <tbody>
        <tr><td>Restaurants &amp; Food</td><td>$21 billion</td></tr>
        <tr><td>Automobiles</td><td>$9 billion</td></tr>
        <tr><td>Clothing</td><td>$5 billion</td></tr>
        <tr><td>Phones</td><td>$4 billion</td></tr>
        <tr><td>Other Amenities</td><td>$46 billion</td></tr>
      </tbody>
      <tfoot>
        <tr><td>Total Purchasing Power</td><td>$85+ billion</td></tr>
      </tfoot>
    </table>
  </div>
</body>
</html>
