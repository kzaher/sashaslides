<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 1280px; height: 720px; overflow: hidden; background: #FFFFFF; font-family: 'Inter', sans-serif; }
.title-bar { background: #4A6FA5; height: 90px; display: flex; align-items: center; padding: 0 58px; }
.title-bar h1 { font-size: 36px; font-weight: 700; color: #FFFFFF; }
.content { padding: 40px 58px 0; max-width: 720px; }
.subtitle { font-size: 22px; font-style: italic; color: #4A6FA5; margin-bottom: 36px; font-weight: 400; }
.contact-block { margin-bottom: 28px; }
.contact-name { font-size: 24px; font-weight: 700; color: #1A1A1A; margin-bottom: 6px; }
.contact-role { font-size: 17px; color: #4A6FA5; margin-bottom: 4px; }
.contact-addr { font-size: 16px; color: #1A1A1A; line-height: 1.55; }
.formats { margin-top: 32px; }
.formats-head { font-size: 15px; font-weight: 700; color: #4A6FA5; margin-bottom: 8px; letter-spacing: 0.02em; }
.formats-text { font-size: 15px; color: #1A1A1A; line-height: 1.5; }
</style>
</head>
<body>
  <div class="title-bar"><h1>Contact</h1></div>
  <div class="content">
    <p class="subtitle">To discuss placements, rates, and targeting packages.</p>
    <div class="contact-block">
      <div class="contact-name">Eduardo Saverin</div>
      <div class="contact-role">CFO, thefacebook.com</div>
      <div class="contact-addr">Cambridge, MA 02138</div>
    </div>
    <div class="formats">
      <div class="formats-head">Ad Formats Available</div>
      <div class="formats-text">Banner ads: 468×60, 120×240, 120×90, 125×125 — and text links.<br>Rates vary based on scope, duration, and targeting depth.</div>
    </div>
  </div>
</body>
</html>
