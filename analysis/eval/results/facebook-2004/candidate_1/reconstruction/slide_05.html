<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 1280px; height: 720px; overflow: hidden; background: #FFFFFF; font-family: 'Inter', sans-serif; }
.title-bar { background: #4A6FA5; height: 90px; display: flex; align-items: center; padding: 0 58px; }
.title-bar h1 { font-size: 36px; font-weight: 700; color: #FFFFFF; }
.main { display: flex; height: calc(720px - 90px); padding: 24px 58px 48px; gap: 24px; position: relative; }
.chart-zone { flex: 0 0 55%; display: flex; align-items: center; justify-content: flex-start; }
.callout-zone { flex: 1; display: flex; flex-direction: column; justify-content: center; padding-left: 16px; gap: 32px; }
.callout-num { font-size: 56px; font-weight: 700; color: #3B5998; line-height: 1; }
.callout-desc { font-size: 14px; color: #1A1A1A; margin-top: 6px; line-height: 1.35; }
.sep { width: 48px; height: 2px; background: #C8DCF0; }
.source { position: absolute; bottom: 18px; right: 58px; font-size: 13px; font-style: italic; color: #888; }
</style>
</head>
