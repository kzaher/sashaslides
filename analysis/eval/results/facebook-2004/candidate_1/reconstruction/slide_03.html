<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 1280px; height: 720px; overflow: hidden; background: #FFFFFF; font-family: 'Inter', sans-serif; }
.title-bar { background: #4A6FA5; height: 90px; display: flex; align-items: center; padding: 0 72px; }
.title-bar span { font-size: 13px; font-weight: 700; color: #C8DCF0; letter-spacing: 0.1em; text-transform: uppercase; }
.label-zone { display: flex; align-items: center; height: calc(720px - 90px); padding-left: 72px; }
.label { font-size: 52px; font-weight: 700; color: #1A1A1A; line-height: 1.18; }
</style>
</head>
<body>
  <div class="title-bar"><span>Section 03</span></div>
  <div class="label-zone">
    <div class="label">User Engagement</div>
  </div>
</body>
</html>
