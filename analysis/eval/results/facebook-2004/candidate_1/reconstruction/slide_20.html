<!-- slide_20.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 1280px; height: 720px; overflow: hidden;
  background: #FFFFFF;
  font-family: 'Inter', system-ui, sans-serif;
}
.slide {
  width: 1280px; height: 720px; position: relative;
  display: flex; align-items: center; justify-content: center;
}
.logo {
  position: absolute; bottom: 32px; right: 48px;
  font-size: 13px; font-style: italic; color: #4A6FA5; font-weight: 700;
}
.quote-zone { width: 62%; text-align: center; }
.quote-text {
  font-family: Georgia, 'Times New Roman', serif;
  font-style: italic; font-size: 26px; line-height: 1.6; color: #1A1A1A;
}
.attribution {
  margin-top: 32px;
  font-size: 13px; font-style: italic; color: #4A6FA5;
}
</style>
</head>
<body>
<div class="slide">
  <div class="logo">thefacebook.com</div>
  <div class="quote-zone">
    <div class="quote-text">"The wonderful thing about The Facebook is its ability to connect so many people through so many different avenues, including courses, interests, houses, politics, concentration, and favourite movies."</div>
    <div class="attribution">— The Harvard Independent, March 4, 2004</div>
  </div>
</div>
</body>
</html>
