<!-- slide_15.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 1280px; height: 720px; overflow: hidden;
  background: #FFFFFF;
  font-family: 'Inter', system-ui, sans-serif;
}
.slide { width: 1280px; height: 720px; display: flex; flex-direction: column; }
.accent-bar { width: 100%; height: 8px; background: #4A6FA5; flex-shrink: 0; }
.body {
  flex: 1; display: flex; align-items: center; padding-left: 60px;
}
.label {
  font-size: 52px; font-weight: 700; color: #4A6FA5;
  letter-spacing: -0.01em; line-height: 1.1;
}
.sub {
  font-size: 22px; font-style: italic; color: #1A1A1A;
  margin-top: 16px;
}
</style>
</head>
<body>
<div class="slide">
  <div class="accent-bar"></div>
  <div class="body">
    <div>
      <div class="label">Online Marketing Services</div>
      <div class="sub">Precision targeting across 16 profile dimensions</div>
    </div>
  </div>
</div>
</body>
</html>
