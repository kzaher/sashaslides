<!-- slide_12.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 1280px; height: 720px; overflow: hidden;
  background: #FFFFFF;
  font-family: 'Inter', system-ui, sans-serif;
}
.slide { width: 1280px; height: 720px; display: flex; flex-direction: column; }
.title-bar {
  background: #4A6FA5; height: 90px;
  display: flex; align-items: center; padding: 0 60px; flex-shrink: 0;
}
.title-bar h1 { color: #FFFFFF; font-size: 32px; font-weight: 700; }
.content {
  flex: 1; display: flex; align-items: center;
  padding: 0 60px;
}
.grid { display: flex; gap: 32px; width: 100%; }
.metric {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; text-align: center;
  padding: 28px 16px; background: #E8F0F8;
}
.metric-icon {
  width: 28px; height: 6px; background: #3B5998;
  margin-bottom: 18px;
}
.metric-num {
  font-size: 48px; font-weight: 700; color: #3B5998;
  line-height: 1; margin-bottom: 10px;
}
.metric-label { font-size: 13px; color: #1A1A1A; line-height: 1.4; }
</style>
</head>
<body>
<div class="slide">
  <div class="title-bar"><h1>Platform Engagement</h1></div>
  <div class="content">
    <div class="grid">
      <div class="metric">
        <div class="metric-icon"></div>
        <div class="metric-num">70K</div>
        <div class="metric-label">Total Users<br>(March 2004)</div>
      </div>
      <div class="metric">
        <div class="metric-icon"></div>
        <div class="metric-num">65%</div>
        <div class="metric-label">Daily Unique<br>Users</div>
      </div>
      <div class="metric">
        <div class="metric-icon"></div>
        <div class="metric-num">95%</div>
        <div class="metric-label">Monthly Unique<br>Users</div>
      </div>
      <div class="metric">
        <div class="metric-icon"></div>
        <div class="metric-num">3M</div>
        <div class="metric-label">Daily<br>Pageviews</div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
