<!-- slide_04.html -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1280px; height: 720px;
    background: #FFFFFF;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    overflow: hidden;
  }
  .slide { padding: 80px; height: 720px; position: relative; }
  .section-label {
    font-size: 13px; font-weight: bold;
    color: #29B6F6; letter-spacing: 2px;
    text-transform: uppercase; margin-bottom: 12px;
  }
  .title {
    font-size: 38px; font-weight: bold;
    color: #333333; margin-bottom: 56px;
  }
  .metric-block { margin-bottom: 44px; }
  .metric-number {
    font-size: 60px; font-weight: bold;
    text-transform: uppercase; line-height: 1;
    margin-bottom: 10px;
  }
  .metric-number.blue { color: #29B6F6; }
  .metric-number.orange { color: #E8711F; }
  .metric-desc {
    font-size: 18px; color: #333333;
  }
  .source {
    position: absolute; bottom: 72px; left: 80px;
    font-size: 12px; color: #888888;
  }
</style>
</head>
<body>
  <div class="slide">
    <div class="section-label">Market Validation</div>
    <div class="title">The Demand Already Exists</div>

    <div class="metric-block">
      <div class="metric-number blue">660,000</div>
      <div class="metric-desc">total registered users on Couchsurfing.com — proof of appetite for local stays</div>
    </div>

    <div class="metric-block">
      <div class="metric-number orange">50,000</div>
      <div class="metric-desc">temporary housing listings posted weekly on Craigslist in the US alone</div>
    </div>

    <div class="source">Source: Couchsurfing.com, Craigslist internal estimates</div>
  </div>
</body>
</html>
