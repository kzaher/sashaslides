<!-- slide_01.html -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1280px; height: 720px;
    background: #FFFFFF;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    overflow: hidden; position: relative;
  }
  .name {
    font-size: 68px; font-weight: bold;
    color: #29B6F6; letter-spacing: -2px;
    margin-bottom: 22px;
  }
  .tagline {
    font-size: 22px; font-weight: normal;
    color: #333333;
  }
  .contact {
    position: absolute; bottom: 72px;
    font-size: 12px; color: #888888;
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>
  <div class="name">AirBed&amp;Breakfast</div>
  <div class="tagline">Book rooms with locals, rather than hotels.</div>
  <div class="contact">airbedandbreakfast.com</div>
</body>
</html>
