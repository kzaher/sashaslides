<!DOCTYPE html>
<html lang="en">
<head>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 1280px; height: 720px; overflow: hidden;
  background: #FFFFFF;
  font-family: 'Inter', sans-serif;
}
body {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  position: relative;
}
.brand {
  font-size: 68px; font-weight: 900; color: #29B6F6;
  letter-spacing: -2px; text-align: center;

  line-height: 1;
}
.tagline {
  font-size: 22px; font-weight: 400; color: #333333;
  text-align: center; line-height: 1.6;
  letter-spacing: 0.2px;
}
.footer {
  position: absolute; bottom: 44px;
  font-size: 11px; color: #888888; letter-spacing: 0.6px;
  text-align: center;
}
</style>
</head>
<body>
  <div class="brand">AirBed&amp;Breakfast</div>
  <div class="tagline">Book rooms with locals, rather than hotels.</div>
