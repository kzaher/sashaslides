<!-- slide_02.html -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1280px; height: 720px; overflow: hidden;
  background: #FFFFFF;
  font-family: 'Helvetica Neue', Arial, system-ui, sans-serif;
  padding: 60px 80px;
}
.title {
  font-size: 34px; font-weight: 700; color: #333333;
  margin-bottom: 10px;
}
.title-underline {
  width: 48px; height: 3px; background: #29B6F6; margin-bottom: 48px;
}
ul {
  list-style: none; padding: 0;
  display: flex; flex-direction: column; gap: 36px;
}
li {
  display: flex; align-items: flex-start; gap: 18px;
  font-size: 20px; font-weight: 400; color: #333333;
  line-height: 1.5; max-width: 900px;
}
li::before {
  content: '';
  display: block; flex-shrink: 0;
  width: 8px; height: 8px; border-radius: 50%;
  background: #29B6F6; margin-top: 8px;
}
</style>
</head>
<body>
  <div class="title">The Problem</div>
  <div class="title-underline"></div>
  <ul>
    <li>Price is an important concern for customers booking travel online.</li>
    <li>Hotels leave you disconnected from the city and its culture.</li>
    <li>No easy way exists to book a room with a local or become a host.</li>
  </ul>
</body>
</html>
