<!-- slide_05.html -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1280px; height: 720px; overflow: hidden;
  background: #FFFFFF;
  font-family: 'Helvetica Neue', Arial, system-ui, sans-serif;
  padding: 60px 80px;
}
.title {
  font-size: 34px; font-weight: 700; color: #333333;
  margin-bottom: 10px;
}
.title-underline {
  width: 48px; height: 3px; background: #29B6F6; margin-bottom: 48px;
}
.metrics { display: flex; flex-direction: column; gap: 0; }
.metric-row {
  display: flex; align-items: baseline; gap: 28px;
  padding: 28px 0;
  border-bottom: 1px solid #D6EEFB;
}
.metric-row:first-child { padding-top: 0; }
.metric-row:last-child { border-bottom: none; }
.metric-number {
  font-size: 48px; font-weight: 700; color: #29B6F6;
  line-height: 1; min-width: 280px; flex-shrink: 0;
}
.metric-info { display: flex; flex-direction: column; gap: 4px; }
.metric-label {
  font-size: 20px; font-weight: 400; color: #333333; line-height: 1.4;
}
.metric-source {
  font-size: 13px; font-weight: 300; color: #999999;
}
</style>
</head>
<body>
  <div class="title">Market Size</div>
  <div class="title-underline"></div>
  <div class="metrics">
    <div class="metric-row">
      <div class="metric-number">2B+</div>
      <div class="metric-info">
        <div class="metric-label">Total Available Market — trips booked worldwide annually</div>
        <div class="metric-source">TAM</div>
      </div>
    </div>
    <div class="metric-row">
      <div class="metric-number">560M</div>
      <div class="metric-info">
        <div class="metric-label">Serviceable Available Market — budget and online trips</div>
        <div class="metric-source">SAM</div>
      </div>
    </div>
    <div class="metric-row">
      <div class="metric-number">84M</div>
      <div class="metric-info">
        <div class="metric-label">Share of Market — trips with AirBed&amp;Breakfast</div>
        <div class="metric-source">SOM — 15% of available market</div>
      </div>
    </div>
  </div>
</body>
</html>
