<!-- slide_01.html -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1280px; height: 720px; overflow: hidden;
  background: #FFFFFF;
  font-family: 'Helvetica Neue', Arial, system-ui, sans-serif;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  position: relative;
}
.brand {
  font-size: 64px; font-weight: 700; color: #333333;
  text-align: center; letter-spacing: -1px;
}
.brand .amp { color: #29B6F6; }
.subtitle {
  font-size: 22px; font-weight: 400; color: #333333;
  text-align: center; margin-top: 28px; max-width: 680px;
  line-height: 1.5;
}
.meta {
  font-size: 12px; font-weight: 300; color: #999999;
  text-align: center; position: absolute; bottom: 60px;
  width: 100%; letter-spacing: 0.5px;
}
</style>
</head>
<body>
  <div class="brand">AirBed<span class="amp">&amp;</span>Breakfast</div>
  <div class="subtitle">Book rooms with locals, rather than hotels.</div>
  <div class="meta">airbedandbreakfast.com</div>
</body>
</html>
