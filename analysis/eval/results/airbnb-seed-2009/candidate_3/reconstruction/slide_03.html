<!-- slide_03.html -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1280px; height: 720px; overflow: hidden;
  background: #FFFFFF;
  font-family: 'Helvetica Neue', Arial, system-ui, sans-serif;
  padding: 60px 80px;
}
.title {
  font-size: 34px; font-weight: 700; color: #333333;
  margin-bottom: 10px;
}
.title-underline {
  width: 48px; height: 3px; background: #29B6F6; margin-bottom: 32px;
}
.lead {
  font-size: 18px; font-weight: 400; color: #555555;
  margin-bottom: 60px; max-width: 800px; line-height: 1.5;
}
.blocks {
  display: flex; gap: 0; flex: 1;
}
.block {
  flex: 1; padding: 0 40px 0 0;
  border-right: 1px solid #D6EEFB;
}
.block:last-child { border-right: none; padding-right: 0; padding-left: 40px; }
.block:first-child { padding-left: 0; }
.block:nth-child(2) { padding-left: 40px; }
.keyword {
  font-size: 28px; font-weight: 700; color: #29B6F6;
  letter-spacing: 1px; margin-bottom: 16px; text-transform: uppercase;
}
.desc {
  font-size: 18px; font-weight: 400; color: #333333;
  line-height: 1.5;
}
</style>
</head>
<body>
  <div class="title">The Solution</div>
  <div class="title-underline"></div>
  <div class="lead">A web platform where users rent out their space to host travelers.</div>
  <div class="blocks">
    <div class="block">
      <div class="keyword">Save Money</div>
      <div class="desc">Pay less than hotels when you travel.</div>
    </div>
    <div class="block">
      <div class="keyword">Make Money</div>
      <div class="desc">Earn income by hosting guests in your space.</div>
    </div>
    <div class="block">
      <div class="keyword">Share Culture</div>
      <div class="desc">Local connection to the city — not a chain hotel.</div>
    </div>
  </div>
</body>
</html>
