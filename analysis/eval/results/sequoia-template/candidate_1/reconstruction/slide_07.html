<!-- slide_07.html -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1280px; height: 720px; overflow: hidden;
    font-family: Arial, Helvetica, sans-serif;
    background: #FFFFFF;
  }
  .slide {
    width: 1280px; height: 720px;
    padding: 90px 128px 72px;
  }
  .title {
    font-size: 40px; font-weight: bold;
    color: #5CB85C; margin-bottom: 48px;
  }
  ul { list-style: none; padding: 0; }
  ul li {
    font-size: 24px; color: #333333;
    line-height: 1.65; padding: 14px 0;
    padding-left: 24px; position: relative;
    max-width: 860px;
  }
  ul li::before {
    content: "—"; position: absolute; left: 0;
    color: #999999;
  }
  .secondary {
    font-size: 17px; color: #999999;
    margin-top: 6px; padding-left: 0;
  }
  .secondary::before { content: none !important; }
</style>
</head>
<body>
<div class="slide">
  <div class="title">Market Size</div>
  <ul>
    <li>Identify and profile the customer you cater to</li>
    <li>Calculate <strong>TAM</strong> top-down, <strong>SAM</strong> bottoms-up, and <strong>SOM</strong></li>
  </ul>
</div>
</body>
</html>
