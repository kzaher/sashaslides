<!-- slide_02.html -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1280px; height: 720px; overflow: hidden;
    font-family: Arial, Helvetica, sans-serif;
    background: #FFFFFF;
  }
  .slide {
    width: 1280px; height: 720px;
    padding: 90px 128px 72px;
  }
  .title {
    font-size: 40px; font-weight: bold;
    color: #5CB85C; margin-bottom: 40px;
  }
  .meta {
    font-size: 14px; color: #999999;
    margin-bottom: 20px; letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  ol {
    list-style: decimal; padding-left: 28px;
    columns: 2; column-gap: 80px;
  }
  ol li {
    font-size: 22px; color: #333333;
    line-height: 1.9; break-inside: avoid;
  }
</style>
</head>
<body>
<div class="slide">
  <div class="title">Pitch Structure</div>
  <div class="meta">Ten sections — one idea each</div>
  <ol>
    <li>Company Purpose</li>
    <li>Problem</li>
    <li>Solution</li>
    <li>Why Now</li>
    <li>Market Size</li>
    <li>Competition</li>
    <li>Product</li>
    <li>Business Model</li>
    <li>Team</li>
    <li>Financials</li>
  </ol>
</div>
</body>
</html>
