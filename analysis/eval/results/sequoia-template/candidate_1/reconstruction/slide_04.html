<!-- slide_04.html -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1280px; height: 720px; overflow: hidden;
    font-family: Arial, Helvetica, sans-serif;
    background: #FFFFFF;
  }
  .slide {
    width: 1280px; height: 720px;
    padding: 90px 128px 72px;
  }
  .title {
    font-size: 40px; font-weight: bold;
    color: #5CB85C; margin-bottom: 48px;
  }
  ul { list-style: none; padding: 0; }
  ul li {
    font-size: 24px; color: #333333;
    line-height: 1.65; padding: 14px 0;
    padding-left: 24px; position: relative;
    max-width: 860px;
  }
  ul li::before {
    content: "—"; position: absolute; left: 0;
    color: #999999;
  }
</style>
</head>
<body>
<div class="slide">
  <div class="title">Problem</div>
  <ul>
    <li>Describe the pain the customer experiences today</li>
    <li>Outline how the customer currently addresses it</li>
  </ul>
</div>
</body>
</html>
