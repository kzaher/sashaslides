<!-- slide_03.html -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1280px; height: 720px; overflow: hidden;
    font-family: Arial, Helvetica, sans-serif;
    background: #FFFFFF;
  }
  .slide {
    width: 1280px; height: 720px;
    padding: 90px 128px 72px;
    display: flex; flex-direction: column;
  }
  .title {
    font-size: 40px; font-weight: bold;
    color: #5CB85C; margin-bottom: 32px;
  }
  .statement {
    font-size: 28px; color: #333333;
    line-height: 1.55; max-width: 820px;
    margin-top: 60px;
  }
  .note {
    font-size: 16px; color: #999999;
    margin-top: 32px;
  }
</style>
</head>
<body>
<div class="slide">
  <div class="title">Company Purpose</div>
  <div class="statement">
    Define your company in a single declarative sentence.
  </div>
  <div class="note">One sentence. No qualifiers. No jargon.</div>
</div>
</body>
</html>
