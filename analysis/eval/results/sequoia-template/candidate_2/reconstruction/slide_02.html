<!-- slide_02.html -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1280px;
  height: 720px;
  background: #FFFFFF;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
  overflow: hidden;
}
.slide {
  padding: 72px 112px;
  height: 100%;
}
h1 {
  font-size: 30px;
  font-weight: 600;
  color: #5CB85C;
  margin-bottom: 44px;
  line-height: 1.3;
}
ul {
  list-style: none;
  padding: 0;
  columns: 2;
  column-gap: 80px;
}
li {
  font-size: 17px;
  color: #333333;
  line-height: 1.7;
  padding: 3px 0;
  break-inside: avoid;
}
</style>
</head>
<body>
<div class="slide">
  <h1>What this deck covers</h1>
  <ul>
    <li>Company Purpose</li>
    <li>Problem</li>
    <li>Solution</li>
    <li>Why Now</li>
    <li>Market Size</li>
    <li>Competition</li>
    <li>Product</li>
    <li>Business Model</li>
    <li>Team</li>
    <li>Financials</li>
  </ul>
</div>
</body>
</html>
