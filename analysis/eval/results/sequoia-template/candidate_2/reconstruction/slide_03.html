<!-- slide_03.html -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1280px;
  height: 720px;
  background: #FFFFFF;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
  overflow: hidden;
}
.slide {
  padding: 72px 112px;
  height: 100%;
}
h1 {
  font-size: 30px;
  font-weight: 600;
  color: #5CB85C;
  margin-bottom: 52px;
  line-height: 1.3;
}
p {
  font-size: 18px;
  color: #333333;
  line-height: 1.6;
  max-width: 680px;
}
.meta {
  margin-top: 40px;
  font-size: 12px;
  color: #999999;
  line-height: 1.6;
  max-width: 560px;
}
</style>
</head>
<body>
<div class="slide">
  <h1>Company Purpose</h1>
  <p>Define the company in a single declarative sentence.</p>
  <p class="meta">This sentence is the north star of the entire deck. Every subsequent slide either supports it or loses the audience. Write it before building any other slide.</p>
</div>
</body>
</html>
