<!-- slide_04.html -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1280px;
  height: 720px;
  background: #FFFFFF;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
  overflow: hidden;
}
.slide {
  padding: 72px 112px;
  height: 100%;
}
h1 {
  font-size: 30px;
  font-weight: 600;
  color: #5CB85C;
  margin-bottom: 44px;
  line-height: 1.3;
}
ul {
  list-style: none;
  padding: 0;
}
li {
  font-size: 17px;
  color: #333333;
  line-height: 1.6;
  padding: 10px 0;
  padding-left: 20px;
  position: relative;
}
li::before {
  content: '';
  position: absolute;
  left: 0;
  top: 20px;
  width: 6px;
  height: 6px;
  background: #333333;
  border-radius: 50%;
}
</style>
</head>
<body>
<div class="slide">
  <h1>What pain does the customer feel?</h1>
  <ul>
    <li>Describe the problem in the customer's own words, not yours</li>
    <li>Show how customers address this issue today</li>
    <li>Make clear why the current approach is insufficient</li>
  </ul>
</div>
</body>
</html>
