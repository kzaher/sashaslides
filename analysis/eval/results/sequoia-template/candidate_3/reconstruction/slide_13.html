<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 1280px; height: 720px; overflow: hidden; }
body {
  background: #5CB85C;
  font-family: "Helvetica Neue", Arial, sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.headline {
  color: #FFFFFF;
  font-size: 56px;
  font-weight: 700;
  line-height: 1.2;
  text-align: center;
}
.support {
  margin-top: 32px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
}
.support-line {
  color: #FFFFFF;
  font-size: 24px;
  font-weight: 400;
  line-height: 1.5;
  text-align: center;
}
</style>
</head>
<body>
  <div class="headline">Tell Your Story</div>
  <div class="support">
    <div class="support-line">Structure gives your idea clarity.</div>
    <div class="support-line">What problem will you solve?</div>
  </div>
</body>
</html>
