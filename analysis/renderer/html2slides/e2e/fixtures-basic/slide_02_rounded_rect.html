<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1280px; height: 720px; overflow: hidden; background: #ffffff; font-family: Arial, sans-serif; }
.container { display: flex; gap: 80px; align-items: center; justify-content: center; height: 100%; }
.box { width: 240px; height: 240px; background: #f0f0f0; display: flex; align-items: center; justify-content: center; font-size: 18px; color: #333; }
</style></head><body>
<div class="container">
  <div class="box" style="border-radius: 8px;">8px radius</div>
  <div class="box" style="border-radius: 16px;">16px radius</div>
  <div class="box" style="border-radius: 50%; width: 240px; height: 240px;">Circle</div>
</div>
</body></html>
