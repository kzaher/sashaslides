<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1280px; height: 720px; overflow: hidden; background: #1a1a2e; font-family: Arial, sans-serif; }
.container { display: flex; align-items: center; justify-content: center; height: 100%; }
.card { width: 480px; padding: 40px; background: #ffffff; border-radius: 12px; border-left: 4px solid #1e88e5; box-shadow: 0 8px 16px rgba(0,0,0,0.3); }
.title { font-size: 28px; font-weight: bold; color: #1a1a2e; margin-bottom: 16px; }
.body { font-size: 16px; color: #555; line-height: 1.6; }
</style></head><body>
<div class="container">
  <div class="card">
    <div class="title">Mixed Primitives Card</div>
    <div class="body">This card combines rounded corners, a left accent border, box-shadow, and text on a dark slide background.</div>
  </div>
</div>
</body></html>
