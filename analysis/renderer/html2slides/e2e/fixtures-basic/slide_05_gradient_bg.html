<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1280px; height: 720px; overflow: hidden; background: #ffffff; font-family: Arial, sans-serif; }
.container { display: flex; gap: 60px; align-items: center; justify-content: center; height: 100%; }
.box { width: 280px; height: 180px; display: flex; align-items: center; justify-content: center; font-size: 20px; color: #ffffff; font-weight: bold; border-radius: 8px; }
</style></head><body>
<div class="container">
  <div class="box" style="background: linear-gradient(135deg, #1e88e5, #8e24aa);">Blue → Purple</div>
  <div class="box" style="background: linear-gradient(90deg, #43a047, #00897b);">Green → Teal</div>
  <div class="box" style="background: linear-gradient(180deg, #fb8c00, #e53935);">Orange → Red</div>
</div>
</body></html>
