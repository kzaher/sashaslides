<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1280px; height: 720px; overflow: hidden; background: #e8e8e8; font-family: Arial, sans-serif; }
.container { display: flex; align-items: center; justify-content: center; height: 100%; }
.box { width: 400px; height: 240px; background: #ffffff; border-radius: 12px; border-top: 4px solid #1e88e5; display: flex; align-items: center; justify-content: center; font-size: 20px; color: #333; }
</style></head><body>
<div class="container">
  <div class="box">Rounded + top border only</div>
</div>
</body></html>
