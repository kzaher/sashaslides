<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1280px; height: 720px; overflow: hidden; background: #e8e8e8; font-family: Arial, sans-serif; }
.container { display: flex; gap: 80px; align-items: center; justify-content: center; height: 100%; }
.box { width: 260px; height: 180px; background: #ffffff; display: flex; align-items: center; justify-content: center; font-size: 18px; color: #333; }
</style></head><body>
<div class="container">
  <div class="box" style="border-left: 4px solid #1e88e5;">Left border</div>
  <div class="box" style="border-top: 4px solid #e53935;">Top border</div>
  <div class="box" style="border-bottom: 4px solid #43a047;">Bottom border</div>
</div>
</body></html>
