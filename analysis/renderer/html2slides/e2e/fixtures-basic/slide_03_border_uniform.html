<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1280px; height: 720px; overflow: hidden; background: #ffffff; font-family: Arial, sans-serif; }
.container { display: flex; gap: 80px; align-items: center; justify-content: center; height: 100%; }
.box { width: 260px; height: 180px; background: #ffffff; display: flex; align-items: center; justify-content: center; font-size: 18px; color: #333; }
</style></head><body>
<div class="container">
  <div class="box" style="border: 2px solid #1e88e5;">2px solid blue</div>
  <div class="box" style="border: 3px dashed #e53935;">3px dashed red</div>
  <div class="box" style="border: 4px solid #43a047;">4px solid green</div>
</div>
</body></html>
