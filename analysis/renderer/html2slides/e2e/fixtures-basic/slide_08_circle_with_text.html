<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1280px; height: 720px; overflow: hidden; background: #ffffff; font-family: Arial, sans-serif; }
.container { display: flex; gap: 100px; align-items: center; justify-content: center; height: 100%; }
.circle { width: 160px; height: 160px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 36px; font-weight: bold; color: #ffffff; }
</style></head><body>
<div class="container">
  <div class="circle" style="background: #1e88e5;">A</div>
  <div class="circle" style="background: #8e24aa;">SC</div>
  <div class="circle" style="background: #43a047;">99</div>
</div>
</body></html>
