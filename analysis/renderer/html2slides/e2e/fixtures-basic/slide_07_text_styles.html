<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1280px; height: 720px; overflow: hidden; background: #ffffff; font-family: Arial, sans-serif; }
.container { display: flex; flex-direction: column; gap: 24px; padding: 80px 120px; }
</style></head><body>
<div class="container">
  <div style="font-size: 48px; font-weight: bold;">Bold 48px</div>
  <div style="font-size: 24px; font-style: italic;">Italic 24px</div>
  <div style="font-size: 24px; text-decoration: underline;">Underlined text</div>
  <div style="font-size: 24px; text-decoration: line-through;">Strikethrough text</div>
  <div style="display: flex; gap: 40px; font-size: 24px;">
    <span style="color: #e53935;">Red text</span>
    <span style="color: #1e88e5;">Blue text</span>
    <span style="color: #43a047;">Green text</span>
  </div>
  <div style="font-size: 12px; color: #666;">Small 12px text for testing minimum size</div>
</div>
</body></html>
