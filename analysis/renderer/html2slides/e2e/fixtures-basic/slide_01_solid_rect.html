<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1280px; height: 720px; overflow: hidden; background: #ffffff; font-family: Arial, sans-serif; }
.label { font-size: 18px; color: #333; margin-bottom: 8px; }
.container { display: flex; gap: 60px; align-items: flex-end; justify-content: center; padding-top: 120px; }
.item { text-align: center; }
</style></head><body>
<div class="container">
  <div class="item">
    <div class="label">Red</div>
    <div style="width: 200px; height: 260px; background: #e53935;"></div>
  </div>
  <div class="item">
    <div class="label">Green</div>
    <div style="width: 300px; height: 180px; background: #43a047;"></div>
  </div>
  <div class="item">
    <div class="label">Blue</div>
    <div style="width: 160px; height: 320px; background: #1e88e5;"></div>
  </div>
</div>
</body></html>
