<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1280px; height: 720px; overflow: hidden; font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
.bg-glow { position: absolute; width: 500px; height: 500px; border-radius: 50%; background: radial-gradient(circle, rgba(99,102,241,0.15) 0%, transparent 70%); top: 50%; left: 50%; transform: translate(-50%, -50%); }
.confetti { position: absolute; width: 8px; height: 8px; border-radius: 2px; opacity: 0.3; }
.trophy-container { position: relative; margin-bottom: 24px; }
.trophy-ring { width: 120px; height: 120px; border-radius: 50%; background: conic-gradient(from 0deg, #f59e0b, #ef4444, #ec4899, #8b5cf6, #3b82f6, #10b981, #f59e0b); padding: 4px; }
.trophy-inner { width: 100%; height: 100%; border-radius: 50%; background: #1e1b4b; display: flex; align-items: center; justify-content: center; font-size: 48px; }
.trophy-shine { position: absolute; top: -8px; right: -8px; width: 32px; height: 32px; border-radius: 50%; background: #f59e0b; display: flex; align-items: center; justify-content: center; font-size: 16px; box-shadow: 0 0 20px rgba(245,158,11,0.5); }
.label-badge { background: rgba(99,102,241,0.2); border: 1px solid rgba(99,102,241,0.3); color: #a5b4fc; font-size: 12px; font-weight: 600; padding: 6px 20px; border-radius: 20px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px; }
.main-title { font-size: 48px; font-weight: 800; color: #ffffff; text-align: center; font-family: 'Playfair Display', serif; margin-bottom: 8px; }
.amount { font-size: 72px; font-weight: 800; background: linear-gradient(135deg, #f59e0b, #ef4444); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: center; margin-bottom: 8px; line-height: 1; }
.amount-sub { font-size: 16px; color: #94a3b8; text-align: center; margin-bottom: 32px; }
.investors-label { font-size: 11px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 14px; }
.investors-row { display: flex; gap: 16px; margin-bottom: 36px; }
.investor-card { width: 180px; height: 64px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; display: flex; align-items: center; justify-content: center; padding: 0 16px; gap: 12px; }
.investor-icon { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 700; color: white; }
.investor-card:nth-child(1) .investor-icon { background: linear-gradient(135deg, #3b82f6, #1d4ed8); }
.investor-card:nth-child(2) .investor-icon { background: linear-gradient(135deg, #10b981, #059669); }
.investor-card:nth-child(3) .investor-icon { background: linear-gradient(135deg, #8b5cf6, #6d28d9); }
.investor-name { font-size: 13px; font-weight: 600; color: #e2e8f0; }
.investor-type { font-size: 10px; color: #64748b; margin-top: 2px; }
.metrics-row { display: flex; gap: 48px; }
.metric { text-align: center; position: relative; }
.metric:not(:last-child)::after { content: ''; position: absolute; right: -24px; top: 8px; bottom: 8px; width: 1px; background: rgba(255,255,255,0.1); }
.metric-value { font-size: 36px; font-weight: 800; color: #ffffff; }
.metric-label { font-size: 12px; color: #64748b; font-weight: 500; margin-top: 4px; text-transform: uppercase; letter-spacing: 1px; }
</style></head><body>
<div class="bg-glow"></div>
<!-- Decorative confetti -->
<div class="confetti" style="top:80px;left:120px;background:#f59e0b;transform:rotate(25deg)"></div>
<div class="confetti" style="top:140px;left:200px;background:#ef4444;transform:rotate(-15deg);width:6px;height:12px"></div>
<div class="confetti" style="top:60px;right:180px;background:#8b5cf6;transform:rotate(45deg)"></div>
<div class="confetti" style="top:120px;right:250px;background:#3b82f6;transform:rotate(-30deg);width:10px;height:6px"></div>
<div class="confetti" style="bottom:150px;left:150px;background:#10b981;transform:rotate(60deg)"></div>
<div class="confetti" style="bottom:100px;right:120px;background:#ec4899;transform:rotate(-45deg)"></div>

<div class="trophy-container">
  <div class="trophy-ring"><div class="trophy-inner">&#127942;</div></div>
  <div class="trophy-shine">&#10024;</div>
</div>
<div class="label-badge">Milestone Achieved</div>
<div class="main-title">Series A Funded</div>
<div class="amount">$15M</div>
<div class="amount-sub">raised to accelerate growth and global expansion</div>
<div class="investors-label">Lead Investors</div>
<div class="investors-row">
  <div class="investor-card">
    <div class="investor-icon">SV</div>
    <div><div class="investor-name">Summit Ventures</div><div class="investor-type">Lead Investor</div></div>
  </div>
  <div class="investor-card">
    <div class="investor-icon">GC</div>
    <div><div class="investor-name">Green Capital</div><div class="investor-type">Co-Lead</div></div>
  </div>
  <div class="investor-card">
    <div class="investor-icon">NX</div>
    <div><div class="investor-name">Nexus Partners</div><div class="investor-type">Strategic</div></div>
  </div>
</div>
<div class="metrics-row">
  <div class="metric"><div class="metric-value">45</div><div class="metric-label">Team Members</div></div>
  <div class="metric"><div class="metric-value">12</div><div class="metric-label">Countries</div></div>
  <div class="metric"><div class="metric-value">$3.2M</div><div class="metric-label">ARR Revenue</div></div>
  <div class="metric"><div class="metric-value">340%</div><div class="metric-label">YoY Growth</div></div>
</div>
</body></html>
