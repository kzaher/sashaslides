<!-- slide_02.html -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700;1,800;1,900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:1280px; height:720px; overflow:hidden; font-family:'Inter',sans-serif; }
.slide { width:1280px; height:720px; position:relative; background:#FFFFFF; display:flex; align-items:center; justify-content:center; }
.left-panel { position:absolute; left:64px; top:0; bottom:0; display:flex; flex-direction:column; justify-content:center; width:300px; }
.section-title { font-size:13px; font-weight:700; font-style:italic; color:#F44060; letter-spacing:5px; text-transform:uppercase; margin-bottom:14px; }
.headline { font-size:28px; font-weight:900; color:#1A1A1A; text-transform:uppercase; line-height:1.1; margin-bottom:20px; }
.desc { font-size:14px; font-weight:400; color:#666666; line-height:1.6; }
.legend { margin-top:28px; display:flex; flex-direction:column; gap:8px; }
.legend-item { display:flex; align-items:center; gap:10px; }
.legend-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.legend-text { font-size:11px; font-weight:600; color:#1A1A1A; text-transform:uppercase; letter-spacing:1px; }
.wheel-wrap { width:560px; height:560px; flex-shrink:0; }
svg text { font-family:'Inter',sans-serif; }
</style>
</head>
<body>
<div class="slide">
  <div class="left-panel">
    <div class="section-title">The Framework</div>
    <div class="headline">The Brand Architecture</div>
    <div class="desc">Every Peloton decision maps to this wheel. From product truth through emotional outcome.</div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#F44060"></div><div class="legend-text">Core Promise</div></div>
      <div class="legend-item"><div class="legend-dot" style="background:#2A2A3A"></div><div class="legend-text">Product Truths</div></div>
      <div class="legend-item"><div class="legend-dot" style="background:#C89090"></div><div class="legend-text">Functional Benefits</div></div>
      <div class="legend-item"><div class="legend-dot" style="background:#1A1A1A"></div><div class="legend-text">Emotional Outcomes</div></div>
    </div>
  </div>
  <svg id="wheel" viewBox="0 0 520 520" width="520" height="520" style="margin-left:auto;margin-right:64px;flex-shrink:0;"></svg>
</div>
<script>
(function(){
  var svg=document.getElementById('wheel');
  var cx=260,cy=260;
  var NS='http://www.w3.org/2000/svg';
  function pt(r,deg){var rad=(deg-90)*Math.PI/180;return[cx+r*Math.cos(rad),cy+r*Math.sin(rad)];}
  function arc(r1,r2,a1,a2){var p1=pt(r1,a1),p2=pt(r1,a2),p3=pt(r2,a2),p4=pt(r2,a1);var lg=(a2-a1)>180?1:0;return['M',p1[0].toFixed(2),p1[1].toFixed(2),'A',r1,r1,0,lg,1,p2[0].toFixed(2),p2[1].toFixed(2),'L',p3[0].toFixed(2),p3[1].toFixed(2),'A',r2,r2,0,lg,0,p4[0].toFixed(2),p4[1].toFixed(2),'Z'].join(' ');}
  function el(tag,attrs){var e=document.createElementNS(NS,tag);for(var k in attrs){e.setAttribute(k,attrs[k]);}svg.appendChild(e);return e;}
  function txt(x,y,lines,sz,fill,fw){var g=document.createElementNS(NS,'g');lines.forEach(function(l,i){var t=document.createElementNS(NS,'text');t.setAttribute('x',x);t.setAttribute('y',y+(i-(lines.length-1)/2)*sz*1.35);t.setAttribute('font-size',sz);t.setAttribute('fill',fill);t.setAttribute('font-weight',fw||'700');t.setAttribute('text-anchor','middle');t.setAttribute('dominant-baseline','middle');t.style.fontFamily='Inter,sans-serif';t.textContent=l;g.appendChild(t);});svg.appendChild(g);}
  // Center
  el('circle',{cx:cx,cy:cy,r:74,fill:'#F44060',stroke:'#fff','stroke-width':3});
  txt(cx,cy,['MAKES YOU WANT','TO SHOW UP'],9.5,'#FFFFFF','900');
  // Ring1: 4 product truths
  var p1i=[['LEADERBOARD','& METRICS'],['PASSIONATE','COMMUNITY'],['TOP TIER','INSTRUCTORS'],['ALWAYS','READY']];
  var p1f=['#1A1A1A','#252535','#1A1A1A','#252535'];
  for(var i=0;i<4;i++){var a1=i*90+1.5,a2=(i+1)*90-1.5;el('path',{d:arc(78,138,a1,a2),fill:p1f[i],stroke:'#fff','stroke-width':1.5});var mid=(a1+a2)/2,mp=pt(108,mid);txt(mp[0],mp[1],p1i[i],7.5,'#FFFFFF','700');}
  // Ring2: 6 functional
  var p2i=[['HARD WORK','FUN'],['REMOVES','BARRIERS'],['PUSHES TO','EXCEL'],['INNOVATIVE','DESIGN'],['WHOLLY','IMMERSIVE'],['FOR','COMPETITION']];
  var p2f=['#C89090','#DBA8A8','#C89090','#DBA8A8','#C89090','#DBA8A8'];
  for(var i=0;i<6;i++){var a1=i*60+1,a2=(i+1)*60-1;el('path',{d:arc(142,198,a1,a2),fill:p2f[i],stroke:'#fff','stroke-width':1});var mid=(a1+a2)/2,mp=pt(170,mid);txt(mp[0],mp[1],p2i[i],6.5,'#1A1A1A','700');}
  // Ring3: 6 emotional
  var p3i=[['NOTHING','IN MY WAY'],['I BELONG','TO SOMETHING'],['I CAN','ACCOMPLISH'],['CAPTIVATING'],['TECH-SAVVY'],['COMMITTED']];
  var p3f=['#1A1A1A','#26263A','#1A1A1A','#26263A','#1A1A1A','#26263A'];
  for(var i=0;i<6;i++){var a1=i*60+1,a2=(i+1)*60-1;el('path',{d:arc(202,256,a1,a2),fill:p3f[i],stroke:'#fff','stroke-width':1});var mid=(a1+a2)/2,mp=pt(229,mid);txt(mp[0],mp[1],p3i[i],6,'#FFFFFF','600');}
  // Thin outer ring label arc area
  el('circle',{cx:cx,cy:cy,r:258,fill:'none',stroke:'#E8E8E8','stroke-width':1});
})();
</script>
</body>
</html>
