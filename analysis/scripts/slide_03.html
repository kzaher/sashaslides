<!-- slide_03.html -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    width:1280px; height:720px;
    background:#E8ECF0;
    font-family:"Helvetica Neue",Arial,sans-serif;
    font-weight:300;
    overflow:hidden;
    position:relative;
  }
</style>
</head>
<body>
  <!-- Zone A: title, top-center -->
  <div style="position:absolute;left:0;right:0;top:60px;text-align:center;">
    <span style="font-size:44px;font-weight:300;color:#333;letter-spacing:-0.02em;">Why Bitcoin Matters</span>
  </div>

  <!-- Zone B: three icon+label pairs, horizontal thirds -->
  <!-- Item 1: Instant -->
  <div style="position:absolute;left:80px;top:50%;transform:translateY(-48%);width:340px;text-align:center;">
    <svg width="64" height="64" viewBox="0 0 64 64" style="display:block;margin:0 auto;" xmlns="http://www.w3.org/2000/svg">
      <!-- Lightning bolt -->
      <path d="M 40,4 L 18,36 L 30,36 L 22,60 L 46,28 L 34,28 Z" fill="#4A90D9"/>
    </svg>
    <div style="margin-top:14px;font-size:30px;font-weight:300;color:#333;letter-spacing:-0.02em;">Instant</div>
  </div>

  <!-- Item 2: International -->
  <div style="position:absolute;left:50%;transform:translate(-50%,-48%);top:50%;width:340px;text-align:center;">
    <svg width="64" height="64" viewBox="0 0 64 64" style="display:block;margin:0 auto;" xmlns="http://www.w3.org/2000/svg">
      <!-- Globe -->
      <circle cx="32" cy="32" r="27" fill="none" stroke="#4A90D9" stroke-width="2.5"/>
      <ellipse cx="32" cy="32" rx="13" ry="27" fill="none" stroke="#4A90D9" stroke-width="2"/>
      <line x1="5" y1="32" x2="59" y2="32" stroke="#4A90D9" stroke-width="1.8"/>
      <path d="M 10,18 Q 32,12 54,18" fill="none" stroke="#4A90D9" stroke-width="1.5"/>
      <path d="M 10,46 Q 32,52 54,46" fill="none" stroke="#4A90D9" stroke-width="1.5"/>
    </svg>
    <div style="margin-top:14px;font-size:30px;font-weight:300;color:#333;letter-spacing:-0.02em;">International</div>
  </div>

  <!-- Item 3: No Fees -->
  <div style="position:absolute;right:80px;top:50%;transform:translateY(-48%);width:340px;text-align:center;">
    <svg width="64" height="64" viewBox="0 0 64 64" style="display:block;margin:0 auto;" xmlns="http://www.w3.org/2000/svg">
      <!-- Zero-fee circle with dollar crossed out -->
      <circle cx="32" cy="32" r="27" fill="none" stroke="#4A90D9" stroke-width="2.5"/>
      <text x="32" y="28" font-family="Helvetica Neue,Arial,sans-serif" font-size="22" font-weight="300" fill="#4A90D9" text-anchor="middle">$0</text>
      <text x="32" y="46" font-family="Helvetica Neue,Arial,sans-serif" font-size="11" font-weight="300" fill="#4A90D9" text-anchor="middle">FEES</text>
    </svg>
    <div style="margin-top:14px;font-size:30px;font-weight:300;color:#333;letter-spacing:-0.02em;">No Fees</div>
  </div>
</body>
</html>
