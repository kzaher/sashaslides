<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    width:1280px; height:720px;
    background:#E8ECF0;
    font-family:"Helvetica Neue",Arial,sans-serif;
    font-weight:300;
    overflow:hidden;
    position:relative;
  }
</style>
</head>
<body>
  <!-- Zone A: brand + tagline, left 40% -->
  <div style="position:absolute;left:80px;top:50%;transform:translateY(-50%);width:430px;">
    <div style="font-size:44px;font-weight:300;color:#4A90D9;letter-spacing:-0.02em;line-height:1.1;">Coinbase</div>
    <div style="margin-top:14px;font-size:40px;font-weight:300;color:#333;letter-spacing:-0.02em;line-height:1.25;">Your Hosted<br>Bitcoin Wallet</div>
    <div style="margin-top:22px;font-size:22px;font-weight:300;color:#555;letter-spacing:-0.02em;line-height:1.45;">Send, receive, and manage<br>Bitcoin from any device.</div>
  </div>

  <!-- Zone B: device mockups, right 60% -->
  <svg style="position:absolute;right:0;top:0;" width="768" height="720" viewBox="0 0 768 720" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="6" stdDeviation="14" flood-color="rgba(0,0,0,0.18)"/>
      </filter>
    </defs>

    <!-- === DESKTOP BROWSER MOCKUP === -->
    <rect x="20" y="90" width="510" height="370" rx="10" fill="#EFEFEF" filter="url(#sh)"/>
    <rect x="20" y="90" width="510" height="40" rx="10" fill="#E0E0E0"/>
    <rect x="20" y="110" width="510" height="20" fill="#E0E0E0"/>

    <circle cx="46" cy="110" r="6" fill="#FF5F56"/>
    <circle cx="66" cy="110" r="6" fill="#FFBD2E"/>
    <circle cx="86" cy="110" r="6" fill="#27C93F"/>
    <!-- URL bar -->
    <rect x="112" y="101" width="285" height="18" rx="9" fill="white"/>
    <text x="254" y="113" font-family="Helvetica Neue,Arial,sans-serif" font-size="10" fill="#999" text-anchor="middle">coinbase.com</text>
    <!-- Content area -->
    <rect x="20" y="130" width="510" height="330" fill="white"/>
    <!-- App header -->
    <rect x="20" y="130" width="510" height="44" fill="#2E6DB4"/>

    <!-- Balance -->
    <text x="275" y="212" font-family="Helvetica Neue,Arial,sans-serif" font-size="30" font-weight="200" fill="#333" text-anchor="middle">0.42 BTC</text>
    <text x="275" y="233" font-family="Helvetica Neue,Arial,sans-serif" font-size="13" fill="#888" text-anchor="middle">≈ $237.48 USD</text>

    <rect x="183" y="250" width="84" height="28" rx="4" fill="#4A90D9"/>

    <rect x="278" y="250" width="92" height="28" rx="4" fill="none" stroke="#4A90D9" stroke-width="1.5"/>
    <text x="324" y="268" font-family="Helvetica Neue,Arial,sans-serif" font-size="12" fill="#4A90D9" text-anchor="middle">Receive</text>

    <line x1="40" y1="346" x2="512" y2="346" stroke="#F5F5F5" stroke-width="1"/>
    <text x="40" y="368" font-family="Helvetica Neue,Arial,sans-serif" font-size="11" fill="#555">Sent to 3FZbgi4... · Yesterday</text>
    <text x="512" y="368" font-family="Helvetica Neue,Arial,sans-serif" font-size="11" font-weight="600" fill="#C0392B" text-anchor="end">−0.05 BTC</text>

    <text x="512" y="432" font-family="Helvetica Neue,Arial,sans-serif" font-size="11" font-weight="600" fill="#2B9A48" text-anchor="end">+0.08 BTC</text>

    <text x="708" y="362" font-family="Helvetica Neue,Arial,sans-serif" font-size="8" fill="#2B9A48" text-anchor="end">+0.32</text>
    <line x1="602" y1="370" x2="708" y2="370" stroke="#F5F5F5" stroke-width="1"/>
    <text x="602" y="386" font-family="Helvetica Neue,Arial,sans-serif" font-size="8" fill="#555">Received</text>
    <text x="708" y="386" font-family="Helvetica Neue,Arial,sans-serif" font-size="8" fill="#2B9A48" text-anchor="end">+0.08</text>
    <circle cx="655" cy="430" r="12" fill="none" stroke="#444" stroke-width="1.5"/>

    <!-- === TABLET MOCKUP (landscape, smallest) === -->
    <rect x="18" y="498" width="255" height="188" rx="14" fill="#2D2D2D" filter="url(#sh)"/>
    <circle cx="145" cy="505" r="3.5" fill="#3A3A3A"/>
    <rect x="32" y="513" width="227" height="158" fill="white"/>
    <rect x="32" y="513" width="227" height="30" fill="#2E6DB4"/>

    <text x="145" y="577" font-family="Helvetica Neue,Arial,sans-serif" font-size="9" fill="#888" text-anchor="middle">$237.48 USD</text>
    <rect x="82" y="586" width="52" height="18" rx="3" fill="#4A90D9"/>
